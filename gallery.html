<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gallery.css">
</head>
<body>

<!-- Header -->
<header class="gallery-header" id="galleryHeader">
    <a href="/" class="gallery-back">返回首页</a>
    <div class="gallery-header__info">
        <h1 class="gallery-header__title" id="galleryTitle"></h1>
        <p class="gallery-header__category" id="galleryCategory"></p>
    </div>
</header>

<!-- Gallery Grid -->
<main class="gallery-main">
    <div class="gallery-grid" id="galleryGrid"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightboxClose">&times;</button>
    <button class="lightbox__prev" id="lightboxPrev">&#8249;</button>
    <button class="lightbox__next" id="lightboxNext">&#8250;</button>
    <div class="lightbox__content">
        <img class="lightbox__image" id="lightboxImage" src="" alt="">
    </div>
    <div class="lightbox__counter" id="lightboxCounter"></div>
</div>

<script src="/js/config.js"></script>
<script src="/js/gallery.js"></script>
</body>
</html>
